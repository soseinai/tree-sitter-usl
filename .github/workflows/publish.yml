name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tree-sitter/setup-action/cli@v2
      - run: tree-sitter generate --no-bindings
      - run: |
          mkdir -p dist
          cc -Isrc -std=c11 -fPIC -c src/parser.c -o dist/parser.o
          cc -Isrc -std=c11 -fPIC -c src/scanner.c -o dist/scanner.o
          ar rcs dist/libtree-sitter-usl.a dist/parser.o dist/scanner.o
          rm dist/*.o
      - run: tree-sitter build --wasm
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/libtree-sitter-usl.a \
            tree-sitter-usl.wasm

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - uses: tree-sitter/setup-action/cli@v2
      - run: tree-sitter generate --no-bindings
      - run: cd bindings/node && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - uses: actions/checkout@v4
      - uses: tree-sitter/setup-action/cli@v2
      - run: tree-sitter generate --no-bindings
      - run: cd bindings/rust && cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: tree-sitter/setup-action/cli@v2
      - run: tree-sitter generate --no-bindings
      - run: pip install build twine
      - run: cd bindings/python && python -m build
      - run: cd bindings/python && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
